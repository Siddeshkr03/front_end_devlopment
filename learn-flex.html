<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex</title>
    <style>
      .main {
        height: 1000px;
        border: 2px solid blue;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        align-items: center;
        flex-wrap: wrap;
      }

      .one {
        height: 150px;
        width: 150px;
        background-color: blue;
        border: 2px solid black;
        font-size: 50px;
        text-align: center;
      }

      .two {
        height: 150px;
        width: 150px;
        background-color: red;
        border: 2px solid black;
        font-size: 50px;
        text-align: center;
      }

      .three {
        height: 150px;
        width: 150px;
        background-color: yellow;
        border: 2px solid black;
        font-size: 50px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">One</div>
      <div class="two">Two</div>
      <div class="three">Three</div>
    </div>
  </body>
</html>
