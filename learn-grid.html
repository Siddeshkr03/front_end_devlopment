<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <style>
      .one {
        height: 300px;
        width: auto;
        background-color: red;
        font-size: 200px;
        text-align: center;
      }

      .two {
        height: 300px;
        width: auto;
        background-color: yellow;
        font-size: 200px;
        text-align: center;
      }

      .three {
        height: 300px;
        width: auto;
        background-color: green;
        font-size: 200px;
        text-align: center;
      }

      .four {
        height: 300px;
        width: auto;
        background-color: fuchsia;
        font-size: 200px;
        text-align: center;

      }
      .main {
        display: grid;
        grid-template-columns: 30% 70%;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
      <div class="four">4</div>
    </div>
  </body>
</html>
