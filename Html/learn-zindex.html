<html>
    <head>
        <title>Z-index</title>
        <style>
            .one{
                width: 200px;
                height: 100px;
                border: 2px solid black;
                background-color: aqua;
                position: relative;
                top: 50px;
                z-index: 1;
            }

            .two{
                 width: 200px;
                height: 100px;
                border: 2px solid black;
                background-color: yellowgreen;
                position: relative;
                z-index: 2;
            }
        </style>
    </head>
    <body>
        <div class="one">One</div>
        <div class="two">Two</div>
    </body>
</html>
