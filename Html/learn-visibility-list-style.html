<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visibility</title>
    <style>
      .one {
        width: 150px;
        height: 150px;
        background-color: red;
        display: none;
      }

      .two {
        width: 150px;
        height: 150px;
        background-color: green;
      }

      li {
        list-style-type: lower-roman;
      }

      .four {
        width: 150px;
        height: 150px;
        background-color: green;
        text-align: center;
        border: 2px solid black;
      }

      .five {
        padding: 50px;
        width: 150px;
        height: 150px;
        background-color: aqua;
        text-align: center;
        border: 2px solid black;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="one"></div>
    <div class="two"></div>
    <ul>
      <li>List Item One</li>
      <li>List Item two</li>
      <li>List Item three</li>
      <li>List Item four</li>
    </ul>

    <div class="four">Content one</div>
    <div class="five">Content two</div>
  </body>
</html>
