<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web 1</title>
    <style>
      .section {
        width: 95vw;
        height: 95vh;
        margin: 20px;
        color: black;
        position: relative;
        text-align: center;
        border: 2px solid black;
        position: relative;
      }

      .sub-section{
        color: black;
        font-size: 50px;
        width: 400px;
        height: 100px;
        position: absolute;
        top: 200px;
        left: 500px;
        position: absolute;
        left:500px;
      }

      .image {
        width: 95vw;
        height: 95vh;
      }

      .submit{
        font-size: 20px;
        width: 100px;
        height:30px;
        border-radius: 20px;
        border: 1px solid rgb(25, 205, 245);
        background-color: gray;
        position: absolute;
        left: 60px;
      }

      .response{
        font-size: 20px;
        width: 100px;
        height:30px;
        border-radius: 20px;
        border: 1px solid grey;
        background-color: aqua;
        position: absolute;
        right: 100px;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTZZqx7KIh6N35jQ469JWzcpNDgiqgGkGcwjQ&s"
        class="image"
      />
      <div class="sub-section">With great Design comes great response
        <div class="submit">Submit</div>
        <div class="response">Response</div>
      </div>
    </div>
  </body>
</html>
