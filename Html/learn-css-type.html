<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn CSS</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      * {
        background-color: rgb(221, 99, 99);
      }
      h2 {
        color: blue;
        background-color: rgb(255, 85, 0);
      }
      h1,
      .para {
        color: rgb(165, 224, 28);
      }
    </style>
  </head>
  <body>
    <h1 style="color: rgb(0, 179, 255)">CSS</h1>
    <h2>Heading 2</h2>
    <p class="para">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatibus amet
      totam commodi praesentium ut ipsam culpa obcaecati neque, qui accusantium
      a atque harum possimus dolor porro! Impedit corrupti consequuntur dolores
      illo pariatur neque reiciendis!
    </p>
  </body>
</html>
