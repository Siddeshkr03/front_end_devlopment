<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
</head>
<style>
    .one{
        background-color: yellow;
        display: inline;
    }

    .two{
        background-color: orange;
        display: block;
    }
</style>
<body>
    <div class="one">Test  one</div>
    <span class="two">Test two</span>
    
</body>
</html>
