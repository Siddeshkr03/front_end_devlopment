<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        .one{
            background-color: blue;
            width: 800px;
            height: 150px;
            font-size: 100px;
            text-align: center;
            /* position: relative; */
            top: 200px;
            left: 400px;

        }

        .two{
            background-color: red;
            width: 800px;
            height: 150px;
            font-size: 100px;
            text-align: center;
             /* position: static; */
             position: sticky;
            top: 200px;
            left: 400px;

        }

        .three{
            background-color: chartreuse;
            width: 800px;
            height: 350px;
            font-size: 100px;
            text-align: center;
            /* position: fixed; */
            top: 200px;
            left: 400px;
        }

        .four{
            background-color: yellow;
            width: 800px;
            height: 150px;
            font-size: 100px;
            text-align: center;
            /* position: sticky; */
            top: 100px;
            left: 400px;
        }

        .five{
            background-color: orange;
            width: 800px;
            height: 150px;
            font-size: 100px;
            text-align: center;
            /* position: relative; */
            top: 200px;
            left: 400px;
        }

        .six{
            background-color: violet;
            width: 800px;
            height: 150px;
            font-size: 100px;
            text-align: center;
        }
        
    </style>
</head>

<body>
    <div class="one">1</div>
    <div class="two">2</div>
    <div class="three">3</div>
    <div class="four">4</div>
    <div class="five">5</div>
    <div class="six">6</div>
</body>
</html>
