<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation</title>
    <style>
      .box {
        width: 300px;
        height: 300px;
        background-color: red;
        border: 2px solid black;
        font-size: 100px;
        text-align: center;
        animation-name: hello;
        animation-duration: 2s;
        animation-iteration-count: 10;
        position: relative;
      }

      /* @keyframes hello {
            from{
                background-color: red;
            }
        to{
            background-color: blueviolet;
        } */

      @keyframes hello {
        0% {
          top: 0px;
          left: 0px;
        }
        25% {
          top: 0px;
          left: 200px;
        }
        50% {
          top: 200px;
          left: 200px;
        }
        75% {
          top: 200px;
          left: 0px;
        }
        100% {
          top: 0px;
          left: 0px;
        }
      }
    </style>
  </head>
  <body>
    <div class="box">Box</div>
  </body>
</html>
