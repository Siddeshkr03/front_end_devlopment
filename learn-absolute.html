<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute</title>
    <style>
        .section{
            width: 800px;
            height: 400px;
            border: 2px solid black;
            background-color: blue; 
            position: relative;

        }

        .sub-section{
            width: 300px;
            height: 100px;
            background-color: yellowgreen;
            border: 2px solid black;
            position: absolute;
            top: 80px;
            right: 200px;

        }
    </style>
</head>
<body>
    <div class="section">
        <div class="sub-section">
        </div>
    </div>
</body>
</html>
