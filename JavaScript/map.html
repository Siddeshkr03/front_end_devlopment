<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map method</title>
</head>
<body>
    <h1 id="heading"></h1>

    <script>
        let arr= [
            { name: "David", age: 23},
            { name: "Johnny", age: 30},
            { name: "Miller", age: 32}
        ]

        document.getElementById("heading").innerHTML = arr.map((val) => {
            return `Name is ${val.name}`
        })
        .join("<br>");
    </script>
</body>
</html>
